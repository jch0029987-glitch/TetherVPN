name: Build TetherVPN APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Setup JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      # 3️⃣ Setup Android SDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 34
          build-tools: 34.0.0

      # 4️⃣ Build the debug APK for the app module
      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug

      # 5️⃣ Upload the debug APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TetherVPN-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk
