name: Build TetherVPN APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Setup JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      # 3️⃣ Setup Android SDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 34
          build-tools: 34.0.0

      # 4️⃣ Build the APK
      - name: Build APK
        run: ./gradlew assembleRelease

      # 5️⃣ Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: TetherVPN-release.apk
          path: app/build/outputs/apk/release/app-release.apk
